# ============================================================
# 应用 Deployment + Service + HPA
#
# 关键特性：
#   - 优雅关闭：terminationGracePeriodSeconds=60
#   - preStop Sleep 5s：等待 kube-proxy 移除 Endpoint
#   - 存活探针 / 就绪探针
#   - HPA 自动扩缩容
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: integration-config-system
  namespace: integration-system
  labels:
    app: integration-config-system
spec:
  # 滚动更新策略（零停机部署）
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0    # 不可用 Pod 数量：0 = 始终保持全量
      maxSurge: 1          # 最多超出期望副本数：1

  replicas: 2
  selector:
    matchLabels:
      app: integration-config-system

  template:
    metadata:
      labels:
        app: integration-config-system
    spec:
      # 优雅关闭总时间
      terminationGracePeriodSeconds: 60

      # Init Container：等待 MySQL 就绪（避免启动失败）
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for MySQL..."
              until nc -z integration-mysql 3306; do
                echo "MySQL is not ready, sleeping 5s..."
                sleep 5
              done
              echo "MySQL is ready."
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Redis..."
              until nc -z integration-redis 6379; do
                echo "Redis is not ready, sleeping 3s..."
                sleep 3
              done
              echo "Redis is ready."

      containers:
        - name: app
          # 替换为你的镜像地址
          image: registry.example.com/integration-config-system:1.0.0
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          # ================================================
          # 优雅关闭（Spring Boot 2.3+ 内置支持）
          # ================================================
          # 停止策略：graceful（默认）
          # 关闭宽限期：60 秒（与 terminationGracePeriodSeconds 相同）
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: integration-config
                  key: SPRING_PROFILES_ACTIVE

            # 三数据源
            - name: SPRING_DATASOURCE-CONFIG_URL
              valueFrom:
                configMapKeyRef:
                  name: integration-config
                  key: SPRING_DATASOURCE-CONFIG_URL
            - name: SPRING_DATASOURCE-LOG_URL
              valueFrom:
                configMapKeyRef:
                  name: integration-config
                  key: SPRING_DATASOURCE-LOG_URL
            - name: SPRING_DATASOURCE-TOKEN_URL
              valueFrom:
                configMapKeyRef:
                  name: integration-config
                  key: SPRING_DATASOURCE-TOKEN_URL
            - name: SPRING_DATASOURCE-CONFIG_DRIVER-CLASS-NAME
              valueFrom:
                configMapKeyRef:
                  name: integration-config
                  key: SPRING_DATASOURCE-CONFIG_DRIVER-CLASS-NAME
            - name: SPRING_DATASOURCE-LOG_DRIVER-CLASS-NAME
              valueFrom:
                configMapKeyRef:
                  name: integration-config
                  key: SPRING_DATASOURCE-LOG_DRIVER-CLASS-NAME
            - name: SPRING_DATASOURCE-TOKEN_DRIVER-CLASS-NAME
              valueFrom:
                configMapKeyRef:
                  name: integration-config
                  key: SPRING_DATASOURCE-TOKEN_DRIVER-CLASS-NAME

            # 密码（从 Secret 注入）
            - name: SPRING_DATASOURCE-CONFIG_USERNAME
              valueFrom:
                secretKeyRef:
                  name: integration-secrets
                  key: SPRING_DATASOURCE-CONFIG_USERNAME
            - name: SPRING_DATASOURCE-CONFIG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: integration-secrets
                  key: SPRING_DATASOURCE-CONFIG_PASSWORD
            - name: SPRING_DATASOURCE-LOG_USERNAME
              valueFrom:
                secretKeyRef:
                  name: integration-secrets
                  key: SPRING_DATASOURCE-LOG_USERNAME
            - name: SPRING_DATASOURCE-LOG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: integration-secrets
                  key: SPRING_DATASOURCE-LOG_PASSWORD
            - name: SPRING_DATASOURCE-TOKEN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: integration-secrets
                  key: SPRING_DATASOURCE-TOKEN_USERNAME
            - name: SPRING_DATASOURCE-TOKEN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: integration-secrets
                  key: SPRING_DATASOURCE-TOKEN_PASSWORD

            # Redis
            - name: SPRING_DATA_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: integration-config
                  key: SPRING_DATA_REDIS_HOST
            - name: SPRING_DATA_REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: integration-config
                  key: SPRING_DATA_REDIS_PORT
            - name: SPRING_DATA_REDIS_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: integration-config
                  key: SPRING_DATA_REDIS_DATABASE
            - name: SPRING_DATA_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: integration-secrets
                  key: SPRING_DATA_REDIS_PASSWORD

            # JVM 容器感知
            - name: JDK_JAVA_OPTIONS
              value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"

          # ================================================
          # 健康检查
          # ================================================
          livenessProbe:
            httpGet:
              path: /api/health/session
              port: http
            initialDelaySeconds: 60   # 等待启动完成
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /api/health/session
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          # ================================================
          # 资源限制
          # ================================================
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 1Gi

          # ================================================
          # 生命周期钩子 — 优雅关闭
          # ================================================
          lifecycle:
            preStop:
              exec:
                # 等待 kube-proxy 更新 Endpoint（默认 5 秒），
                # 确保新请求不再路由到即将停止的 Pod
                command: ["/bin/sh", "-c", "sleep 5"]

          volumeMounts:
            - name: app-data
              mountPath: /app/data

      volumes:
        - name: app-data
          emptyDir: {}    # 开发环境用 emptyDir；生产建议 PVC

---
# ClusterIP Service
apiVersion: v1
kind: Service
metadata:
  name: integration-config-system
  namespace: integration-system
  labels:
    app: integration-config-system
spec:
  type: ClusterIP
  selector:
    app: integration-config-system
  ports:
    - name: http
      port: 80
      targetPort: http

---
# HPA — 自动扩缩容
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: integration-config-system-hpa
  namespace: integration-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: integration-config-system
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70   # CPU > 70% 时扩容
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80   # 内存 > 80% 时扩容
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0   # 快速扩容（0 秒后立即扩）
      policies:
        - type: Percent
          value: 100                 # 每次最多翻倍
          periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 300  # 缩容前等待 5 分钟（防止抖动）
      policies:
        - type: Percent
          value: 50                  # 每次最多缩减 50%
          periodSeconds: 60
