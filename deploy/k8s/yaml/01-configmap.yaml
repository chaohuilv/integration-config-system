# ============================================================
# ConfigMap — 应用配置（环境变量方式注入）
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: integration-config
  namespace: integration-system
  labels:
    app: integration-config-system
data:
  # Spring Profile
  SPRING_PROFILES_ACTIVE: "prod"

  # 三数据源
  SPRING_DATASOURCE-CONFIG_URL: "jdbc:mysql://integration-mysql:3306/integration_config?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"
  SPRING_DATASOURCE-LOG_URL:     "jdbc:mysql://integration-mysql:3306/integration_log?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"
  SPRING_DATASOURCE-TOKEN_URL:   "jdbc:mysql://integration-mysql:3306/integration_token?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"

  # MySQL 连接池（HikariCP）
  SPRING_DATASOURCE-CONFIG_DRIVER-CLASS-NAME: "com.mysql.cj.jdbc.Driver"
  SPRING_DATASOURCE-LOG_DRIVER-CLASS-NAME:     "com.mysql.cj.jdbc.Driver"
  SPRING_DATASOURCE-TOKEN_DRIVER-CLASS-NAME:   "com.mysql.cj.jdbc.Driver"

  # Redis
  SPRING_DATA_REDIS_HOST: "integration-redis"
  SPRING_DATA_REDIS_PORT: "6379"
  SPRING_DATA_REDIS_DATABASE: "2"
  SPRING_DATA_REDIS_TIMEOUT: "5000ms"
  SPRING_DATA_REDIS_LETUCISE-POOL_MAX-IDLE: "8"
  SPRING_DATA_REDIS_LETUCISE-POOL_MAX-ACTIVE: "8"

  # Token 配置
  INTEGRATION_TOKEN_EXPIRE-HOURS: "168"

  # 缓存配置
  INTEGRATION_CACHE_ENABLED: "true"
  INTEGRATION_CACHE_PREFIX: "\"integration:cache:\""
  INTEGRATION_CACHE_TTL: "300"

  # 环境管理
  INTEGRATION_ENVIRONMENT_ENABLED: "true"

  # HTTP 超时
  INTEGRATION_HTTP-CONNECT-TIMEOUT: "10000"
  INTEGRATION_HTTP-READ-TIMEOUT:   "30000"
  INTEGRATION_MAX-RETRY: "3"
