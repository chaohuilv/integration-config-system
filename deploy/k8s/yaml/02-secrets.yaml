# ============================================================
# Secret — 敏感信息（Base64 编码）
#
# 生成示例：
#   echo -n 'root-secret'       | base64          # MySQL root 密码
#   echo -n 'app-secret'        | base64          # MySQL 应用密码
#   echo -n 'redis-secret'      | base64          # Redis 密码
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: integration-secrets
  namespace: integration-system
type: Opaque
stringData:
  # MySQL root 密码（示例，请替换为真实密码）
  MYSQL_ROOT_PASSWORD: root-secret

  # MySQL 应用连接账户（可选）
  SPRING_DATASOURCE-CONFIG_USERNAME: root
  SPRING_DATASOURCE-LOG_USERNAME:     root
  SPRING_DATASOURCE-TOKEN_USERNAME:   root
  SPRING_DATASOURCE-CONFIG_PASSWORD: root-secret
  SPRING_DATASOURCE-LOG_PASSWORD:     root-secret
  SPRING_DATASOURCE-TOKEN_PASSWORD:   root-secret

  # Redis 密码
  SPRING_DATA_REDIS_PASSWORD: redis-secret
