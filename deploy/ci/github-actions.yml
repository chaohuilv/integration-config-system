# ============================================================
# GitHub Actions — CI/CD Pipeline
#
# 触发条件：
#   push 到 main 分支  → 自动部署到生产
#   push 到 release/*  → 自动部署到预发
#   pull request       → 运行测试（不部署）
#
# 需要在 GitHub Settings 中配置以下 Secrets：
#   REGISTRY_URL          镜像仓库地址（如 registry.example.com）
#   REGISTRY_USERNAME     镜像仓库用户名
#   REGISTRY_PASSWORD     镜像仓库密码（或使用 Docker Auth）
#   KUBECONFIG_DATA       kubeconfig 文件内容（Base64 编码）
#   HELM_VALUES_SECRETS   生产环境 Helm values Override（Base64 编码，可选）
#
# Docker BuildX 构建多架构（amd64 + arm64）:
#   如不需要多架构，删除 buildx 步骤并改用 docker/build-push-action
# ============================================================

name: Build & Deploy

on:
  push:
    branches:
      - main        # 推送 main → 生产部署
      - release/*   # 推送 release/* → 预发部署
  pull_request:
    branches: [main]

env:
  REGISTRY:       ${{ secrets.REGISTRY_URL }}
  APP_NAME:       integration-config-system
  IMAGE_NAME:     ${{ secrets.REGISTRY_URL }}/integration-config-system
  HELM_CHART_DIR: deploy/k8s/helm

jobs:
  # ============================================================
  # Job 1: Maven 构建
  # ============================================================
  build:
    name: Maven Build
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      dockerfile_path: deploy/docker/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Maven Package
        run: mvn clean package -DskipTests -B

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

  # ============================================================
  # Job 2: Docker 构建 + 推送镜像
  # ============================================================
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU（多架构支持）
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,    event=branch
            type=sha,    prefix={{branch}}-,format=short
            type=raw,    value=latest,             enable=${{ github.ref == 'refs/heads/main' }}
            type=semver, pattern={{version}},      enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build & Push（多架构）
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          file: ${{ needs.build.outputs.dockerfile_path }}

      - name: Extract image digest
        run: |
          echo "IMAGE_TAG=${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "::set-output name=image::${{ env.IMAGE_NAME }}:${{ github.sha }}::"

  # ============================================================
  # Job 3: 单元测试
  # ============================================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Tests
        run: mvn test -B

  # ============================================================
  # Job 4: Helm 部署到 Kubernetes（生产/预发）
  # ============================================================
  deploy:
    name: Helm Deploy to K8s
    runs-on: ubuntu-latest
    needs: [build, docker]
    if: github.event_name != 'pull_request'
    environment: ${{ startsWith(github.ref, 'refs/heads/release/') && 'staging' || 'production' }}

    environment:
      name: ${{ startsWith(github.ref, 'refs/heads/release/') && 'staging' || 'production' }}
      url: https://${{ startsWith(github.ref, 'refs/heads/release/') && 'staging.' || '' }}api.your-domain.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > kubeconfig
          echo "KUBECONFIG=$(pwd)/kubeconfig" >> $GITHUB_ENV

      - name: Update Helm values（生产/预发各自的值文件）
        run: |
          # 替换镜像版本
          sed -i 's|imageTag: ".*"|imageTag: "${{ github.sha }}"|' ${{ env.HELM_CHART_DIR }}/values.yaml

          # 替换镜像仓库地址
          sed -i 's|imageRegistry:.*|imageRegistry: "${{ env.REGISTRY }}"|' ${{ env.HELM_CHART_DIR }}/values.yaml

          cat ${{ env.HELM_CHART_DIR }}/values.yaml

      - name: Helm Diff（变更预览，可选）
        uses: datarootsio/helm-diff-action@v1.0.0
        with:
          chart: ${{ env.HELM_CHART_DIR }}
          namespace: integration-system
          values: ${{ env.HELM_CHART_DIR }}/values.yaml
        env:
          HELM_ACC: " "
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_DATA }}
        continue-on-error: true

      - name: Helm Deploy
        run: |
          helm upgrade --install \
            integration \
            ${{ env.HELM_CHART_DIR }} \
            --namespace integration-system \
            --create-namespace \
            --wait --timeout 5m \
            --values ${{ env.HELM_CHART_DIR }}/values.yaml \
            --set global.imageTag=${{ github.sha }} \
            --set mysql.auth.rootPassword=${{ secrets.MYSQL_ROOT_PASSWORD }} \
            --set redis.auth.password=${{ secrets.REDIS_PASSWORD }} \
            --atomic \
            --output status

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/integration-config-system \
            -n integration-system \
            --timeout=120s

      - name: Verify health
        run: |
          kubectl exec -n integration-system \
            deploy/integration-config-system \
            -- curl -sf http://localhost:8080/api/health/session \
            || { echo "Health check failed"; exit 1; }

      - name: Helm status
        run: helm list -n integration-system

  # ============================================================
  # Job 5: 通知（部署完成后通知）
  # ============================================================
  notify:
    name: Notify on Completion
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()
    steps:
      - name: Deployment result
        run: |
          if [[ "${{ needs.deploy.result }}" == "success" ]]; then
            echo "✅ Deployment completed successfully"
          else
            echo "❌ Deployment failed: ${{ needs.deploy.result }}"
          fi
