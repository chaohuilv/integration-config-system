# ===========================================
# 应用配置 - application.yml
# ===========================================

server:
  port: 8080

spring:
  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false
  application:
    name: integration-config-system

  # ========== 静态资源配置 ==========
  web:
    resources:
      cache:
        period: 0
      chain:
        cache: false

  # ========== DevTools 配置 ==========
  devtools:
    restart:
      enabled: true
      additional-paths: src/main/resources/static
    livereload:
      enabled: true

  # ========== 数据源配置 ==========
  datasource-config:
    url: jdbc:h2:./data/integration_config;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # ========== 日志数据源配置 ==========
  datasource-log:
    url: jdbc:h2:./data/integration_log;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # ========== Token 数据源配置 ==========
  datasource-token:
    url: jdbc:h2:./data/integration_token;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # H2 Web Console 配置
  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  # ========== Redis 配置（Token 和缓存共用） ==========
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 2
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  # 不再使用 Spring Session Redis，改用 Bearer Token 认证
  # Token 存放在 Redis database 2，前缀使用 integration:token:

# ===========================================
# 自定义配置 # ===========================================
integration:
  http-connect-timeout: 10000
  http-read-timeout: 30000
  log-request: true
  log-response: true
  max-retry: 3

  # 环境配置开关
  environment:
    enabled: true

  # Token 配置
  token:
    expire-hours: 24  # Token 过期时间（小时）

  # Redis 缓存配置
  cache:
    enabled: true
    prefix: "integration:cache:"
    ttl: 300

# ===========================================
# Nacos 配置（配置推送）
# ===========================================
nacos:
  server-addr: 127.0.0.1:8848
  namespace: public
  username: nacos
  password: nacos
  group: INTEGRATION_API
  timeout: 5000

# ========== SpringDoc OpenAPI 配置 ==========
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    # 自定义 Swagger UI 标题和样式
    custom-site-languages: zh-CN
    # 禁用尝试启动按钮（仅展示文档）
    display-request-duration: true
  show-actuator: false

logging:
  level:
    com.integration.config: INFO
    org.hibernate.SQL: WARN
