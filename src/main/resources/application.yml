# ===========================================
# 统一接口配置系统 - application.yml
# ===========================================

server:
  port: 8080

spring:
  application:
    name: integration-config-system

  # ========== 静态资源开发模式配置 ==========
  web:
    resources:
      cache:
        period: 0
      chain:
        cache: false

  # ========== DevTools 热部署配置 ==========
  devtools:
    restart:
      enabled: true
      additional-paths: src/main/resources/static
    livereload:
      enabled: true

  # ========== Config 数据库（接口配置）==========
  datasource-config:
    url: jdbc:h2:./data/integration_config;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # ========== Log 数据库（调用日志）==========
  datasource-log:
    url: jdbc:h2:./data/integration_log;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # ========== Token 数据库（Token缓存）==========
  datasource-token:
    url: jdbc:h2:./data/integration_token;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # H2 控制台（开发时开启）
  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  # ========== Redis 配置（Token 存储和业务缓存）==========
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 2
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  # 注意：已移除 Spring Session Redis 配置，改用 Bearer Token 认证模式
  # Token 存储在 Redis database 2 中，前缀为 integration:token:

# ===========================================
# 自定义配置
# ===========================================
integration:
  http-connect-timeout: 10000
  http-read-timeout: 30000
  log-request: true
  log-response: true
  max-retry: 3

  # 环境配置功能（自动使用各分组下已启用的环境）
  environment:
    enabled: true

  # Token 配置
  token:
    expire-hours: 24  # Token 过期时间（小时）

  # Redis 缓存配置参数
  cache:
    enabled: true
    prefix: "integration:cache:"
    ttl: 300

logging:
  level:
    com.integration.config: INFO
    org.hibernate.SQL: WARN
