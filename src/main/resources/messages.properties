# ========================
# 统一错误消息（中英文分离）
# ========================
# 前端通过 code 查 key，i18n 由前端处理
# 后端只返回 code + 英文消息（开发调试用）

# ========== 参数/校验错误 ==========
INVALID_PARAM = Invalid parameter
VALIDATION_FAILED = Validation failed: {0}
BIND_FAILED = Bind failed: {0}

# ========== 认证 ==========
AUTH_FAILED = Authentication failed
TOKEN_MISSING = Token is required
TOKEN_INVALID = Token invalid or expired
ACCOUNT_DISABLED = Account is disabled

# ========== 权限 ==========
API_FORBIDDEN = No permission to access this API: {0}
PERMISSION_DENIED = Insufficient permissions
SYSTEM_ROLE_PROTECTED = System role cannot be modified

# ========== 资源 ==========
NOT_FOUND = Resource not found
ALREADY_EXISTS = Resource already exists: {0}
VERSION_CONFLICT = Version conflict
PRECONDITION_FAILED = Precondition failed: {0}

# ========== 服务端 ==========
INTERNAL_ERROR = Internal server error
SERVICE_UNAVAILABLE = Service temporarily unavailable

# ========== 频率限制 ==========
TOO_MANY_REQUESTS = Request frequency exceeds limit

# ========== 通用业务消息 ==========
# 这些是成功操作后的提示，不是错误，但保留 code=200
OPERATION_SUCCESS = Operation successful
CREATE_SUCCESS = Created successfully
UPDATE_SUCCESS = Updated successfully
DELETE_SUCCESS = Deleted successfully

# ========== 各模块业务错误 ==========
# 通用
SELECT_DELETE_RECORDS = Please select records to delete
RECORD_NOT_FOUND = Record not found
CANNOT_DELETE_CURRENT_USER = Cannot delete currently logged-in user

# 环境配置
ENV_NAME_EXISTS = Environment name already exists for this system
ENV_SYSTEM_REQUIRED = System name is required
ENV_URL_REQUIRED = Base URL is required

# 接口配置
API_CODE_REQUIRED = API code is required
API_CODE_EXISTS = API code already exists
API_URL_REQUIRED = API URL is required
CURL_REQUIRED = curl command cannot be empty
IMPORT_NO_API = No API to import

# 用户管理
USER_CODE_REQUIRED = User code is required
USER_CODE_EXISTS = User code already exists
USER_PASSWORD_REQUIRED = Password is required
USER_PASSWORD_WRONG = Incorrect user code or password
USER_NOT_FOUND = User not found

# 角色管理
ROLE_NAME_REQUIRED = Role name is required
ROLE_CODE_EXISTS = Role code already exists
ROLE_NOT_FOUND = Role not found
ROLE_SYSTEM_PROTECTED = System role cannot be modified
ROLE_USER_CONFLICT = Cannot delete role with assigned users

# SDK/调用
SDK_KEY_NOT_FOUND = SDK key not configured
SDK_KEY_INVALID = SDK key invalid
INVOKE_FAILED = Invoke failed: {0}
