# 中文消息（开发参考，生产环境由前端 i18n 处理）
INVALID_PARAM = 参数错误
VALIDATION_FAILED = 校验失败：{0}
BIND_FAILED = 绑定失败：{0}
AUTH_FAILED = 认证失败
TOKEN_MISSING = 请先登录
TOKEN_INVALID = 登录已过期，请重新登录
ACCOUNT_DISABLED = 账号已禁用
API_FORBIDDEN = 无权访问该接口：{0}
PERMISSION_DENIED = 权限不足
SYSTEM_ROLE_PROTECTED = 系统角色不可修改
NOT_FOUND = 记录不存在
ALREADY_EXISTS = 记录已存在：{0}
VERSION_CONFLICT = 版本冲突
PRECONDITION_FAILED = 前置条件不满足：{0}
INTERNAL_ERROR = 服务器内部错误
SERVICE_UNAVAILABLE = 服务暂不可用
OPERATION_SUCCESS = 操作成功
CREATE_SUCCESS = 创建成功
UPDATE_SUCCESS = 更新成功
DELETE_SUCCESS = 删除成功
SELECT_DELETE_RECORDS = 请选择要删除的记录
RECORD_NOT_FOUND = 记录不存在
CANNOT_DELETE_CURRENT_USER = 不能删除当前登录用户
ENV_NAME_EXISTS = 该系统下环境名称已存在
ENV_SYSTEM_REQUIRED = 系统名称不能为空
ENV_URL_REQUIRED = Base URL 不能为空
API_CODE_REQUIRED = 接口编码不能为空
API_CODE_EXISTS = 接口编码已存在
API_URL_REQUIRED = 接口URL不能为空
CURL_REQUIRED = curl 命令不能为空
IMPORT_NO_API = 没有要导入的接口
USER_CODE_REQUIRED = 用户编码不能为空
USER_CODE_EXISTS = 用户编码已存在
USER_PASSWORD_REQUIRED = 密码不能为空
USER_PASSWORD_WRONG = 用户编码或密码错误，或账号已禁用
USER_NOT_FOUND = 用户不存在
ROLE_NAME_REQUIRED = 角色名称不能为空
ROLE_CODE_EXISTS = 角色编码已存在
ROLE_NOT_FOUND = 角色不存在
ROLE_SYSTEM_PROTECTED = 系统角色不可修改
ROLE_USER_CONFLICT = 角色下存在关联用户，无法删除
SDK_KEY_NOT_FOUND = SDK Key 未配置
SDK_KEY_INVALID = SDK Key 无效
INVOKE_FAILED = 调用失败：{0}
