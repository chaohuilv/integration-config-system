<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统一接口配置系统</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔌</text></svg>">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/sidebar.css">
</head>
<body>
    <!-- 全局 Toast 提示 -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- 全局确认弹窗 -->
    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-box">
            <div class="confirm-icon" id="confirmIcon">⚠️</div>
            <div class="confirm-title" id="confirmTitle">确认操作</div>
            <div class="confirm-desc" id="confirmDesc">确定要执行此操作吗？</div>
            <div class="confirm-btns">
                <button class="btn btn-cancel" onclick="utils.closeConfirm()">取消</button>
                <button class="btn btn-danger-ok" id="confirmOkBtn" onclick="utils.doConfirm()">确定</button>
            </div>
        </div>
    </div>

    <!-- 版本更新提示 -->
    <div class="update-toast" id="updateToast">
        <span>🔄 检测到新版本，建议刷新页面</span>
        <button onclick="location.reload()">立即刷新</button>
        <button class="close-btn" onclick="App.closeUpdateToast()">稍后</button>
    </div>

    <!-- 侧边栏由子页面通过 parent 引用 -->
    <div class="app-layout" id="appLayout">
        <!-- 左侧边栏容器 -->
        <div id="sidebarContainer"></div>
        <!-- 右侧内容区 iframe -->
        <main class="main-content">
            <iframe id="contentFrame" name="contentFrame"
                src="pages/api_sdk.html"
                frameborder="0"
                style="width:100%;height:100%;border:none;display:block;">
            </iframe>
        </main>
    </div>

    <!-- 引入 jQuery -->
    <script src="js/vendor/jquery.min.js"></script>
    <!-- 引入工具函数 -->
    <script src="js/utils.js"></script>
    <!-- 引入 API 封装 -->
    <script src="js/api.js"></script>
    <!-- 引入主应用逻辑 -->
    <script src="js/app.js"></script>
</body>
</html>
