<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>接口配置 - 详情</title>
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <div class="view-header">
        <div class="view-title">
            <h2 id="pageTitle">📄 接口详情</h2>
            <p class="view-sub" id="pageSub"></p>
        </div>
        <div class="view-actions">
            <button class="btn btn-ghost" id="editBtn" onclick="doEdit()">✏️ 编辑</button>
            <button class="btn btn-ghost" onclick="parent.loadPage('list')">← 返回列表</button>
        </div>
    </div>

    <div class="view-body" id="body">
        <div style="text-align:center;padding:60px;color:#ccc;">加载中...</div>
    </div>

    <script>
    const API = '/api';
    let currentData = null;
    let currentId = null;
    let apiCode = null;
    let logPage = 1;
    let logTotal = 0;
    const logSize = 10;

    const params = new URLSearchParams(location.search);
    currentId = params.get('id');

    if (parent.setNav) parent.setNav('detail');

    async function load() {
        if (!currentId) { document.getElementById('body').innerHTML = '<div style="text-align:center;padding:60px;">缺少接口ID</div>'; return; }
        try {
            const json = await fetch(`${API}/config/${currentId}`).then(r => r.json());
            if (json.code !== 200) { document.getElementById('body').innerHTML = '<div style="text-align:center;padding:60px;">加载失败</div>'; return; }
            currentData = json.data;
            render();
        } catch (e) {
            document.getElementById('body').innerHTML = '<div style="text-align:center;padding:60px;">请求失败</div>';
        }
    }

    function render() {
        const d = currentData;
        // 后端返回 invokeCount, successCount, successRate
        const totalCalls = d.invokeCount || 0;
        const successCalls = d.successCount || 0;
        const failCalls = totalCalls - successCalls;
        const successRateDisplay = d.successRate != null ? d.successRate.toFixed(1) + '%' : '0%';
        
        // 认证类型友好显示
        const authTypeMap = {
            'NONE': '无认证',
            'BASIC': 'Basic Auth',
            'BEARER': 'Bearer Token',
            'API_KEY': 'API Key',
            'DYNAMIC': '动态Token',
            'OAUTH2': 'OAuth 2.0'
        };
        const authTypeDisplay = authTypeMap[d.authType] || d.authType || '无认证';
        const hasAuth = d.authType && d.authType !== 'NONE';
        
        apiCode = d.code || '';
        document.getElementById('pageTitle').textContent = '📄 ' + (d.name || '接口详情');
        document.getElementById('pageSub').innerHTML = '<code>' + (d.code||'') + '</code>';
        document.getElementById('editBtn').onclick = function() { parent.loadPage('form', currentId); };

        // 构建认证信息HTML
        let authInfoHtml = '<div class="detail-section"><h3>认证信息</h3>';
        authInfoHtml += '<div class="detail-row"><span class="detail-label">认证类型</span><span>' + authTypeDisplay + '</span></div>';
        
        if (hasAuth && d.authInfo) {
            authInfoHtml += '<div class="detail-row"><span class="detail-label">认证信息</span><span><code>' + (d.authInfo.length > 100 ? d.authInfo.substring(0, 100) + '...' : d.authInfo) + '</code></span></div>';
        }
        
        if (d.enableDynamicToken) {
            authInfoHtml += '<div class="detail-row"><span class="detail-label">Token接口</span><span><code>' + (d.tokenApiCode||'-') + '</code></span></div>';
            authInfoHtml += '<div class="detail-row"><span class="detail-label">提取路径</span><span>' + (d.tokenExtractPath||'-') + '</span></div>';
            authInfoHtml += '<div class="detail-row"><span class="detail-label">Token位置</span><span>' + (d.tokenPosition||'HEADER') + '</span></div>';
            if (d.tokenParamName) {
                authInfoHtml += '<div class="detail-row"><span class="detail-label">参数名</span><span>' + d.tokenParamName + '</span></div>';
            }
            if (d.tokenPrefix) {
                authInfoHtml += '<div class="detail-row"><span class="detail-label">前缀</span><span>' + d.tokenPrefix + '</span></div>';
            }
            authInfoHtml += '<div class="detail-row"><span class="detail-label">缓存时间</span><span>' + (d.tokenCacheTime||300) + '秒</span></div>';
        }
        authInfoHtml += '</div>';

        document.getElementById('body').innerHTML = `
        <div class="detail-scroll">
        <div class="detail-stats">
            <div class="stat-card"><div class="stat-value">${totalCalls}</div><div class="stat-label">总调用</div></div>
            <div class="stat-card"><div class="stat-value" style="color:#52c41a">${successCalls}</div><div class="stat-label">成功</div></div>
            <div class="stat-card"><div class="stat-value" style="color:#ff4d4f">${failCalls}</div><div class="stat-label">失败</div></div>
            <div class="stat-card"><div class="stat-value">${successRateDisplay}</div><div class="stat-label">成功率</div></div>
        </div>
        <div class="detail-grid">
            <div class="detail-section">
                <h3>基本信息</h3>
                <div class="detail-row"><span class="detail-label">接口名称</span><span>${d.name||'-'}</span></div>
                <div class="detail-row"><span class="detail-label">接口编码</span><span><code>${d.code||'-'}</code></span></div>
                <div class="detail-row"><span class="detail-label">分组</span><span>${d.groupName||'-'}</span></div>
                <div class="detail-row"><span class="detail-label">状态</span><span class="badge badge-${(d.status||'ACTIVE').toLowerCase()}">${d.status==='ACTIVE'?'启用':'禁用'}</span></div>
                <div class="detail-row"><span class="detail-label">HTTP方法</span><span class="method method-${(d.method||'GET').toLowerCase()}">${d.method||'-'}</span></div>
                <div class="detail-row"><span class="detail-label">超时时间</span><span>${d.timeout||30000}ms</span></div>
                <div class="detail-row"><span class="detail-label">描述</span><span>${d.description||'-'}</span></div>
            </div>
            <div class="detail-section">
                <h3>请求信息</h3>
                <div class="detail-row"><span class="detail-label">目标URL</span><span style="word-break:break-all">${d.url||'-'}</span></div>
                <div class="detail-row"><span class="detail-label">请求参数</span><pre class="detail-json">${d.requestParams||'-'}</pre></div>
                <div class="detail-row"><span class="detail-label">请求头</span><pre class="detail-json">${d.headers||'-'}</pre></div>
                <div class="detail-row"><span class="detail-label">请求体</span><pre class="detail-json">${d.requestBody||'-'}</pre></div>
            </div>
            ${authInfoHtml}
        </div>

        <div class="detail-section" style="margin-top:24px;">
            <h3>该接口调用日志 <button class="btn btn-sm btn-default" onclick="loadLogs(1)" style="margin-left:12px;">🔄 刷新</button></h3>
            <div class="log-container">
                <div class="log-table-wrap" id="logsWrap"><div style="text-align:center;padding:40px;color:#ccc;">点击刷新按钮加载日志</div></div>
                <div class="log-pagination" id="logPagination"></div>
            </div>
        </div>
        </div>`;

        loadLogs(1);
    }

    function doEdit() { parent.loadPage('form', currentId); }

    async function loadLogs(page) {
        logPage = page || 1;
        const url = API + '/invoke/logs?apiCode=' + encodeURIComponent(apiCode) + '&page=' + logPage + '&size=' + logSize;
        const json = await fetch(url).then(r => r.json());
        const wrap = document.getElementById('logsWrap');
        const pagination = document.getElementById('logPagination');
        
        if (json.code !== 200) {
            wrap.innerHTML = '<div style="text-align:center;padding:40px;color:#ccc;">加载失败</div>';
            pagination.innerHTML = '';
            return;
        }
        
        const data = json.data;
        const logs = data.records || [];
        logTotal = data.total || 0;
        
        if (!logs.length) {
            wrap.innerHTML = '<div style="text-align:center;padding:40px;color:#ccc;">暂无日志记录</div>';
            pagination.innerHTML = '';
            return;
        }
        
        let tableHtml = '<table class="table"><thead><tr><th>接口编码</th><th>状态码</th><th>调用时间</th><th>耗时</th><th>结果</th><th>操作</th></tr></thead><tbody>';
        logs.forEach(function(l) {
            tableHtml += '<tr>';
            tableHtml += '<td><code>' + (l.apiCode||'-') + '</code></td>';
            tableHtml += '<td><span style="font-weight:600;color:' + (l.responseStatus>=400?'#ff4d4f':'#52c41a') + '">' + (l.responseStatus||'-') + '</span></td>';
            tableHtml += '<td>' + (l.invokeTime?new Date(l.invokeTime).toLocaleString():'-') + '</td>';
            tableHtml += '<td>' + (l.costTime!=null?l.costTime+'ms':'-') + '</td>';
            tableHtml += '<td><span class="badge badge-' + (l.success?'active':'inactive') + '">' + (l.success?'成功':'失败') + '</span></td>';
            tableHtml += '<td><button class="btn btn-sm btn-default" onclick="showLogDetail(\'' + l.id + '\')">详情</button></td>';
            tableHtml += '</tr>';
        });
        tableHtml += '</tbody></table>';
        wrap.innerHTML = tableHtml;
        pagination.innerHTML = renderPagination();
    }

    function renderPagination() {
        const totalPages = Math.ceil(logTotal / logSize);
        if (totalPages <= 1) return '';
        
        let pages = [];
        for (let i = 1; i <= totalPages; i++) {
            if (i === 1 || i === totalPages || (i >= logPage - 1 && i <= logPage + 1)) {
                pages.push(i);
            } else if (pages[pages.length - 1] !== '...') {
                pages.push('...');
            }
        }
        
        let html = '<button class="btn btn-sm btn-default" onclick="loadLogs(' + (logPage - 1) + ')"' + (logPage <= 1 ? ' disabled' : '') + '>上一页</button>';
        pages.forEach(function(p) {
            if (p === '...') {
                html += '<span style="padding:0 8px;">...</span>';
            } else {
                html += '<button class="btn btn-sm ' + (p === logPage ? 'btn-primary' : 'btn-default') + '" onclick="loadLogs(' + p + ')">' + p + '</button>';
            }
        });
        html += '<button class="btn btn-sm btn-default" onclick="loadLogs(' + (logPage + 1) + ')"' + (logPage >= totalPages ? ' disabled' : '') + '>下一页</button>';
        html += '<span style="margin-left:12px;color:#999;">共 ' + logTotal + ' 条</span>';
        return html;
    }

    async function showLogDetail(id) {
        const json = await fetch(API + '/invoke/logs/detail/' + id).then(r => r.json());
        if (json.code !== 200) return;
        const wrap = document.getElementById('logsWrap');
        const pagination = document.getElementById('logPagination');
        const d = json.data;
        pagination.innerHTML = '';
        
        let detailHtml = '<div style="background:#f5f7fa;border-radius:8px;padding:20px;">';
        detailHtml += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">';
        detailHtml += '<h3 style="margin:0;">日志详情 #' + id + '</h3>';
        detailHtml += '<button class="btn btn-sm btn-default" onclick="loadLogs(' + logPage + ')">← 返回列表</button>';
        detailHtml += '</div>';
        detailHtml += '<table class="table" style="background:white;">';
        detailHtml += '<tr><td style="width:100px;color:#999;">接口编码</td><td><code>' + (d.apiCode||'-') + '</code></td></tr>';
        detailHtml += '<tr><td style="color:#999;">状态码</td><td style="font-weight:600;color:' + (d.responseStatus>=400?'#ff4d4f':'#52c41a') + '">' + (d.responseStatus||'-') + '</td></tr>';
        detailHtml += '<tr><td style="color:#999;">耗时</td><td>' + (d.costTime!=null?d.costTime+'ms':'-') + '</td></tr>';
        detailHtml += '<tr><td style="color:#999;">调用时间</td><td>' + (d.invokeTime?new Date(d.invokeTime).toLocaleString():'-') + '</td></tr>';
        detailHtml += '<tr><td style="color:#999;vertical-align:top;">请求参数</td><td><pre style="margin:0;white-space:pre-wrap;word-break:break-all;">' + (d.requestParams||'-') + '</pre></td></tr>';
        detailHtml += '<tr><td style="color:#999;vertical-align:top;">请求头</td><td><pre style="margin:0;white-space:pre-wrap;word-break:break-all;">' + (d.requestHeaders||'-') + '</pre></td></tr>';
        detailHtml += '<tr><td style="color:#999;vertical-align:top;">请求体</td><td><pre style="margin:0;white-space:pre-wrap;word-break:break-all;">' + (d.requestBody||'-') + '</pre></td></tr>';
        detailHtml += '<tr><td style="color:#999;vertical-align:top;">响应体</td><td><pre style="margin:0;white-space:pre-wrap;word-break:break-all;max-height:200px;overflow:auto;">' + ((d.responseData||'-').substring(0,5000)) + '</pre></td></tr>';
        if (d.errorMessage) {
            detailHtml += '<tr><td style="color:#999;vertical-align:top;">错误信息</td><td style="color:#ff4d4f;"><pre style="margin:0;white-space:pre-wrap;">' + d.errorMessage + '</pre></td></tr>';
        }
        detailHtml += '</table></div>';
        wrap.innerHTML = detailHtml;
    }

    load();
    </script>
</body>
</html>
