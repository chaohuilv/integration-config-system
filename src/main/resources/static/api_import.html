<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>接口配置 - Curl导入</title>
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/index.css">
    <style>
        body { overflow: hidden; }
        .import-scroll { flex: 1; overflow-y: auto; min-height: 0; padding: 24px 28px; }
        .import-wrap { max-width: 900px; }
        .import-card {
            background: white;
            border-radius: 12px;
            border: 1px solid #f0f0f0;
            padding: 28px;
            margin-bottom: 20px;
        }
        .import-card h3 {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin: 0 0 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .import-card h3 span { font-size: 20px; }
        .curl-textarea {
            width: 100%;
            min-height: 160px;
            padding: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 13px;
            resize: vertical;
            background: #fafafa;
            box-sizing: border-box;
            transition: all .2s;
            line-height: 1.6;
        }
        .curl-textarea:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        .curl-textarea::placeholder { color: #bbb; }
        .example-box {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 14px 18px;
            margin-top: 12px;
            font-size: 13px;
            color: #666;
        }
        .example-box strong { color: #333; }
        .import-actions { margin-top: 16px; display: flex; gap: 12px; }
        .parse-result {
            background: white;
            border-radius: 12px;
            border: 1px solid #f0f0f0;
            padding: 20px 24px;
            margin-bottom: 20px;
        }
        .parse-result h3 {
            font-size: 15px;
            font-weight: 600;
            color: #333;
            margin: 0 0 16px;
        }
        .result-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }
        .result-item {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 12px 16px;
        }
        .result-item .label { font-size: 12px; color: #999; margin-bottom: 4px; }
        .result-item .value { font-size: 14px; font-weight: 600; color: #333; word-break: break-all; }
        .result-item .value.method-get { color: #52c41a; }
        .result-item .value.method-post { color: #1890ff; }
        .result-item .value.method-put { color: #fa8c16; }
        .result-item .value.method-delete { color: #ff4d4f; }
        .result-item .value.method-patch { color: #722ed1; }
        .result-detail {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 14px 18px;
            margin-bottom: 12px;
            font-size: 13px;
        }
        .result-detail .label { color: #999; margin-bottom: 6px; font-size: 12px; }
        .result-detail pre {
            margin: 0;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 12px;
            color: #333;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 120px;
            overflow: auto;
            background: white;
            padding: 10px 14px;
            border-radius: 6px;
            border: 1px solid #eee;
        }
        .auth-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .auth-none { background: #f5f5f5; color: #999; }
        .auth-api_key { background: #e6f7e6; color: #52c41a; }
        .auth-bearer { background: #e6f7ff; color: #1890ff; }
        .auth-basic { background: #fff7e6; color: #fa8c16; }
        .auth-dynamic { background: #f9f0ff; color: #722ed1; }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: toastIn 0.3s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            color: white;
        }
        .toast-success { background: linear-gradient(135deg, #52c41a, #389e0d); }
        .toast-error { background: linear-gradient(135deg, #ff4d4f, #cf1322); }
        .toast-warning { background: linear-gradient(135deg, #faad14, #d48806); }
        .toast-info { background: linear-gradient(135deg, #667eea, #5568d3); }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
    </style>
</head>
<body>
    <div class="view-header">
        <div class="view-title">
            <h2>📥 Curl 一键导入</h2>
            <p class="view-sub">粘贴 curl 命令，自动解析并生成接口配置</p>
        </div>
        <div class="view-actions">
            <button class="btn btn-ghost" onclick="parent.loadPage('list')">← 返回列表</button>
        </div>
    </div>

    <div class="view-body">
        <div class="import-scroll">
        <div class="import-wrap">
            <!-- 输入区 -->
            <div class="import-card">
                <h3><span>📋</span> 粘贴 curl 命令</h3>
                <textarea
                    id="curlInput"
                    class="curl-textarea"
                    placeholder="粘贴完整的 curl 命令，例如：

curl -X POST 'https://api.example.com/users' \
  -H 'Content-Type: application/json' \
  -H 'Authorization: Bearer your-token-here' \
  -d '{&quot;name&quot;: &quot;张三&quot;, &quot;age&quot;: 25}'"></textarea>

                <div class="example-box">
                    <strong>💡 支持的格式：</strong><br>
                    • 支持单行和多行 curl 命令<br>
                    • 自动识别 GET/POST/PUT/DELETE/PATCH 方法<br>
                    • 自动识别 Authorization Bearer Token / Basic Auth / API Key<br>
                    • 自动提取请求头和请求体
                </div>

                <div class="import-actions">
                    <button class="btn btn-primary" onclick="parseAndPreview()">
                        🔍 解析预览
                    </button>
                    <button class="btn btn-default" onclick="clearInput()">
                        🗑️ 清空
                    </button>
                </div>
            </div>

            <!-- 解析结果区 -->
            <div id="parseResultArea" style="display:none;"></div>
        </div>
        </div>
    </div>

    <script>
    var API = '/api';

    if (parent.setNav) parent.setNav('import');

    // Toast 提示
    function showToast(message, type) {
        type = type || 'info';
        var icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
        var existing = document.querySelector('.toast');
        if (existing) existing.remove();
        var toast = document.createElement('div');
        toast.className = 'toast toast-' + type;
        toast.innerHTML = '<span>' + icons[type] + '</span><span>' + message + '</span>';
        document.body.appendChild(toast);
        setTimeout(function() {
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(-50%) translateY(-20px)';
            toast.style.transition = 'all 0.3s ease';
            setTimeout(function() { toast.remove(); }, 300);
        }, 3000);
    }

    function clearInput() {
        document.getElementById('curlInput').value = '';
        document.getElementById('parseResultArea').style.display = 'none';
    }

    function parseAndPreview() {
        var curl = document.getElementById('curlInput').value.trim();
        if (!curl) {
            showToast('请输入 curl 命令', 'warning');
            return;
        }

        var area = document.getElementById('parseResultArea');

        // 解析 curl 命令
        var parsed = parseCurlLocal(curl);
        if (!parsed.success) {
            area.innerHTML = '<div class="parse-result" style="border-color:#ff4d4f;"><h3 style="color:#ff4d4f;">❌ ' + parsed.message + '</h3></div>';
            area.style.display = 'block';
            return;
        }

        var authClass = 'auth-' + (parsed.authType || 'none').toLowerCase();
        var authLabels = {
            'NONE': '🔓 无认证',
            'API_KEY': '🔑 API Key',
            'BEARER': '🎫 Bearer Token',
            'BASIC': '🔐 Basic Auth',
            'DYNAMIC': '🔄 动态Token'
        };
        var methodClass = 'method-' + (parsed.method || 'get').toLowerCase();
        var authLabel = authLabels[parsed.authType] || '🔓 无认证';

        // 格式化请求头
        var headersDisplay = '';
        if (parsed.headers && Object.keys(parsed.headers).length > 0) {
            headersDisplay = Object.keys(parsed.headers).map(function(k) {
                return k + ': ' + parsed.headers[k];
            }).join('\n');
        }

        // 请求参数 JSON 格式化
        var paramsDisplay = parsed.requestParams
            ? JSON.stringify(JSON.parse(parsed.requestParams), null, 2)
            : '';

        // 请求参数字符串可读展示
        var paramsRawDisplay = '';
        var rawUrl = parsed.url;
        if (rawUrl && rawUrl.indexOf('?') >= 0) {
            var queryString = rawUrl.split('?')[1];
            paramsRawDisplay = formatQueryString(queryString);
        }

        area.innerHTML = '<div class="parse-result">' +
            '<h3>📊 解析结果预览</h3>' +
            '<div class="result-grid">' +
                '<div class="result-item"><div class="label">接口编码</div><div class="value">' + escapeHtml(parsed.code || '-') + '</div></div>' +
                '<div class="result-item"><div class="label">接口名称</div><div class="value">' + escapeHtml(parsed.name || '-') + '</div></div>' +
                '<div class="result-item"><div class="label">HTTP 方法</div><div class="value ' + methodClass + '">' + (parsed.method || 'GET') + '</div></div>' +
                '<div class="result-item"><div class="label">认证方式</div><div class="value"><span class="auth-tag ' + authClass + '">' + authLabel + '</span></div></div>' +
                '<div class="result-item"><div class="label">分组</div><div class="value">' + escapeHtml(parsed.groupName || '默认分组') + '</div></div>' +
            '</div>' +
            // 目标 URL（不含 query string）
            '<div class="result-detail"><div class="label">🌐 目标 URL</div><pre style="word-break:break-all;">' + escapeHtml(parsed.url || '-') + '</pre></div>' +
            // 请求参数（JSON 格式）
            (paramsDisplay ? '<div class="result-detail"><div class="label">🔗 请求参数（Query Params，JSON）</div><pre>' + escapeHtml(paramsDisplay) + '</pre></div>' : '') +
            // 请求头
            (headersDisplay ? '<div class="result-detail"><div class="label">📋 请求头（Headers）</div><pre>' + escapeHtml(headersDisplay) + '</pre></div>' : '') +
            // 请求体
            (parsed.body ? '<div class="result-detail"><div class="label">📦 请求体（Body）</div><pre>' + escapeHtml(parsed.body) + '</pre></div>' : '') +
            '<div class="import-actions" style="margin-top:16px;">' +
                '<button class="btn btn-primary" onclick="doImport()">✅ 确认导入</button>' +
                '<button class="btn btn-default" onclick="parseAndPreview()">🔄 重新解析</button>' +
            '</div>' +
        '</div>';
        area.style.display = 'block';
    }

    // 本地 curl 解析（与后端 CurlParser 保持一致）
    function parseCurlLocal(curl) {
        if (!curl) return { success: false, message: 'curl command cannot be empty' };

        try {
            // 预处理：合并多行
            curl = curl.trim().replace(/\\\s*/g, ' ').replace(/\s+/g, ' ');

            // 1. 提取 URL（非贪婪，碰到第一个引号就停止）
            var url = null;
            var urlMatch = curl.match(/['"](https?:\/\/[^'"]*?)['"]/);
            if (urlMatch) {
                url = urlMatch[1];
            } else {
                var u2 = curl.match(/(https?:\/\/\S+)/);
                if (u2) {
                    url = u2[1].replace(/['">]+$/, '');
                }
            }
            if (!url || !url.match(/^https?:\/\//)) {
                return { success: false, message: 'URL not found, make sure the curl command contains http:// or https://' };
            }

            // 1.5 从 URL 中分离 query params
            var cleanUrl = url;
            var requestParams = null;
            if (url.indexOf('?') >= 0) {
                var qi = url.indexOf('?');
                cleanUrl = url.substring(0, qi);
                var queryString = url.substring(qi + 1);
                requestParams = parseQueryStringToJson(queryString);
            }

            // 2. 提取方法
            var method = 'GET';
            var methodMatch = curl.match(/-X\s+(\w+)/i);
            if (methodMatch) {
                method = methodMatch[1].toUpperCase();
            } else if (curl.match(/-d\s| --data| --data-raw/i)) {
                method = 'POST';
            }

            // 3. 提取请求头
            var headers = {};
            var headerMatches = curl.match(/-H\s*['"]([^'"]*?)['"]/gi) || [];
            headerMatches.forEach(function(h) {
                var m = h.match(/-H\s+['"](.+?):\s*(.*?)['"]$/i);
                if (m) {
                    headers[m[1].trim()] = m[2].trim();
                }
            });

            // 4. 提取请求体
            var body = null;
            var bodyMatch = curl.match(/-d\s+['"]([^'"]*?)['"]/);
            if (bodyMatch) body = bodyMatch[1];

            // 5. 清理系统 header
            delete headers['Host'];
            delete headers['Content-Length'];
            delete headers['Connection'];
            delete headers['Keep-Alive'];
            delete headers['Accept-Encoding'];
            delete headers['Origin'];

            // 6. 识别认证
            var authType = null, authParamName = null, authValue = null;
            var auth = headers['Authorization'];
            if (auth) {
                if (auth.toLowerCase().indexOf('bearer ') === 0) {
                    authType = 'BEARER';
                } else if (auth.toLowerCase().indexOf('basic ') === 0) {
                    authType = 'BASIC';
                } else {
                    authType = 'API_KEY';
                }
                authParamName = 'Authorization';
                authValue = auth;
            }
            if (!authType) {
                ['X-API-Key', 'Api-Key', 'apikey'].forEach(function(k) {
                    if (headers[k] && !authType) {
                        authType = 'API_KEY';
                        authParamName = k;
                        authValue = headers[k];
                    }
                });
            }

            // 7. 生成编码
            var code = generateCodeLocal(cleanUrl);
            // 8. 生成名称
            var name = generateNameLocal(cleanUrl);
            // 9. 提取分组
            var groupName = extractGroupLocal(cleanUrl);

            return {
                success: true,
                url: cleanUrl,
                requestParams: requestParams,
                method: method,
                headers: headers,
                body: body,
                authType: authType,
                authParamName: authParamName,
                authValue: authValue,
                code: code,
                name: name,
                groupName: groupName
            };
        } catch (e) {
            return { success: false, message: 'parse failed: ' + e.message };
        }
    }

    // 将 query string 转为 JSON
    function parseQueryStringToJson(queryString) {
        if (!queryString) return null;
        var pairs = queryString.split('&');
        var obj = {};
        pairs.forEach(function(pair) {
            var eq = pair.indexOf('=');
            if (eq <= 0) return;
            var key = pair.substring(0, eq);
            var value = eq < pair.length ? decodeURIComponent(pair.substring(eq + 1)) : '';
            obj[key] = value;
        });
        var keys = Object.keys(obj);
        if (keys.length === 0) return null;
        return JSON.stringify(obj, null, 2);
    }

    // 格式化 query string 为可读展示
    function formatQueryString(queryString) {
        if (!queryString) return '';
        return queryString.split('&').map(function(pair) {
            var eq = pair.indexOf('=');
            if (eq <= 0) return decodeURIComponent(pair);
            var key = pair.substring(0, eq);
            var value = eq < pair.length ? decodeURIComponent(pair.substring(eq + 1)) : '';
            return key + ' = ' + value;
        }).join('\n');
    }

    function generateCodeLocal(url) {
        try {
            var path = url.split('?')[0];
            var idx = path.indexOf('://');
            idx = path.indexOf('/', idx + 3);
            if (idx > 0) path = path.substring(idx + 1);
            path = path.replace(/\.[a-zA-Z]+$/, '');
            path = path.replace(/\{[^}]+\}/g, '-');
            path = path.replace(/\/+/g, '-');
            path = path.replace(/[^a-zA-Z0-9\/-]/g, '-');
            path = path.replace(/-+/g, '-').replace(/^-|-$/g, '').toLowerCase();
            return path || 'api';
        } catch (e) { return 'api-' + Date.now().toString(36); }
    }

    function generateNameLocal(url) {
        try {
            var path = url.split('?')[0];
            var idx = path.indexOf('://');
            idx = path.indexOf('/', idx + 3);
            if (idx > 0) path = path.substring(idx + 1);
            var parts = path.split('/');
            for (var i = parts.length - 1; i >= 0; i--) {
                var part = parts[i];
                if (!part || /^\d+$/.test(part) || /^-+$/.test(part)) continue;
                part = part.replace(/[^a-zA-Z0-9]/g, ' ').trim();
                if (part) {
                    return part.charAt(0).toUpperCase() + part.slice(1);
                }
            }
            var di = url.indexOf('://') + 3;
            var ei = url.indexOf('/', di);
            var host = ei > di ? url.substring(di, ei) : url.substring(di);
            return host.charAt(0).toUpperCase() + host.slice(1);
        } catch (e) { return 'API'; }
    }

    function extractGroupLocal(url) {
        try {
            var path = url.split('?')[0];
            var idx = path.indexOf('://');
            idx = path.indexOf('/', idx + 3);
            if (idx < 0) return 'Default';
            var group = path.substring(idx + 1).split('/')[0];
            if (!group) return 'Default';
            return group.charAt(0).toUpperCase() + group.slice(1);
        } catch (e) { return 'Default'; }
    }

    function escapeHtml(str) {
        if (!str) return '-';
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function doImport() {
        var curl = document.getElementById('curlInput').value.trim();
        var btn = document.querySelector('.btn-primary');
        btn.disabled = true;
        btn.textContent = '⏳ 导入中...';

        fetch(API + '/config/import/curl', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ curl: curl })
        })
        .then(function(r) { return r.json(); })
        .then(function(json) {
            if (json.code === 200) {
                showToast('导入成功！接口编码：' + json.data, 'success');
                setTimeout(function() { parent.loadPage('list'); }, 1200);
            } else {
                showToast('导入失败：' + json.message, 'error');
            }
        })
        .catch(function(e) {
            showToast('网络错误：' + e.message, 'error');
        })
        .finally(function() {
            btn.disabled = false;
            btn.textContent = '✅ 确认导入';
        });
    }

    // 粘贴事件：自动解析
    document.getElementById('curlInput').addEventListener('paste', function() {
        setTimeout(parseAndPreview, 100);
    });
    </script>
</body>
</html>
