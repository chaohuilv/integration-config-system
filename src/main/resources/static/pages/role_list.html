<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角色权限管理</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-ACTIVE { background: #e6f7e6; color: #52c41a; }
        .status-INACTIVE { background: #fff2f0; color: #ff4d4f; }
        .system-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            background: #e6f0ff;
            color: #1890ff;
            margin-left: 8px;
        }
        .stat-chip {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            background: #f5f7fa;
            color: #666;
        }
        .stat-chip strong {
            color: #667eea;
            font-weight: 600;
        }
        .stat-chips {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .action-btns {
            display: flex;
            gap: 6px;
        }
    </style>
</head>
<body>
    <div class="view-header">
        <div class="view-title">
            <h2>🔑 角色权限管理</h2>
            <p class="view-sub">管理系统角色，配置用户、接口、菜单和按钮权限</p>
        </div>
        <div class="view-actions">
            <button class="btn btn-primary" id="btn-add" data-permission="role:add" onclick="goToForm()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                新建角色
            </button>
        </div>
    </div>

    <div class="view-body">
        <div class="search-bar">
            <input type="search" class="search-input" id="searchInput" placeholder="搜索角色名称、编码...">
            <button class="btn btn-ghost" id="btnSearch">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                搜索
            </button>
        </div>

        <div class="table-wrap">
            <table class="table">
                <thead>
                    <tr>
                        <th>角色名称</th>
                        <th>编码</th>
                        <th>描述</th>
                        <th>状态</th>
                        <th>关联统计</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="6" class="empty"><div class="empty-icon">📭</div>加载中...</td></tr>
                </tbody>
            </table>
        </div>
        <div class="pagination" id="pagination"></div>
    </div>

    <script src="../js/vendor/jquery.min.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/components/pagination.js"></script>
    <!-- 引入权限组件 -->
    <script src="../js/components/permission.js"></script>

    <script>
    $(function() {
        let currentPage = 1;
        const pageSize = 10;
        let pager; // 分页组件实例

        if (parent.setNav) parent.setNav('roles');

        // 初始化分页组件
        pager = new Pagination('#pagination', {
            pageSize: pageSize,
            onPageChange: function(page) {
                loadRoles(page);
            }
        });

        // 延迟清空搜索框
        setTimeout(() => { $('#searchInput').val(''); }, 50);

        // 初始化权限组件，完成后再加载数据
        Permission.init({ guard: true }).then(() => {
            if (Permission.isDenied()) return;
            loadRoles();
        });

        // 加载角色列表
        function loadRoles(page) {
            if (page) currentPage = page;
            const keyword = $('#searchInput').val().trim();

            API.roles.page({
                keyword: keyword || undefined,
                page: currentPage,
                size: pageSize
            })
            .then(json => renderRoles(json.data))
            .catch(err => utils.toast('加载失败: ' + err.message, 'error'));
        }

        // 渲染角色列表
        function renderRoles(data) {
            const tbody = $('#tableBody');

            if (!data || !data.records || data.records.length === 0) {
                tbody.html('<tr><td colspan="6" class="empty"><div class="empty-icon">📭</div>暂无角色数据</td></tr>');
                return;
            }

            const roles = data.records;

            const rowsHtml = roles.map(r => {
                const statusClass = r.status === 'ACTIVE' ? 'status-ACTIVE' : 'status-INACTIVE';
                const statusText = r.status === 'ACTIVE' ? '启用' : '禁用';
                const systemBadge = r.isSystem ? '<span class="system-badge">系统</span>' : '';
                const canDelete = Permission.has('role:delete') && !r.isSystem;

                return `
                    <tr>
                        <td><strong>${utils.escapeHtml(r.name)}</strong>${systemBadge}</td>
                        <td><code>${utils.escapeHtml(r.code)}</code></td>
                        <td>${utils.escapeHtml(r.description || '-')}</td>
                        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                        <td>
                            <div class="stat-chips">
                                <span class="stat-chip">👤 <strong>${r.userCount || 0}</strong></span>
                                <span class="stat-chip">🔌 <strong>${r.apiCount || 0}</strong></span>
                                <span class="stat-chip">📋 <strong>${r.menuCount || 0}</strong></span>
                                <span class="stat-chip">🔘 <strong>${r.permissionCount || 0}</strong></span>
                            </div>
                        </td>
                        <td class="action-btns">
                            ${Permission.render('role:edit', `<button class="btn btn-sm btn-default" onclick="goToDetail('${r.id}')">编辑</button>`)}
                            ${canDelete ? `<button class="btn btn-sm btn-danger" onclick="deleteRole('${r.id}', '${utils.escapeHtml(r.name)}')">删除</button>` : ''}
                        </td>
                    </tr>
                `;
            }).join('');

            tbody.html(rowsHtml);
            pager.render(data, currentPage);
        }

        // 搜索
        $('#btnSearch').on('click', () => loadRoles(1));
        $('#searchInput').on('keydown', function(e) {
            if (e.key === 'Enter') loadRoles(1);
        });

        // 跳转编辑
        window.goToDetail = function(roleId) {
            if (parent.loadPage) {
                parent.loadPage('roleEdit', roleId);
            } else {
                window.location.href = 'role_edit.html?id=' + roleId;
            }
        };

        // 新建角色
        window.goToForm = function() {
            if (parent.loadPage) {
                parent.loadPage('roleEdit');
            } else {
                window.location.href = 'role_edit.html';
            }
        };

        // 删除角色
        window.deleteRole = async function(id, name) {
            const confirmed = await utils.showConfirm(
                '删除角色',
                `确定要删除角色「${name}」吗？\n\n此操作将同时删除相关的用户角色关联和接口权限配置。`,
                '🗑️',
                true
            );
            if (!confirmed) return;

            try {
                await API.roles.delete(id);
                utils.toast('角色已删除', 'success');
                loadRoles();
            } catch (err) {
                utils.toast(err.message || '删除失败', 'error');
            }
        };
    });
    </script>
</body>
</html>
