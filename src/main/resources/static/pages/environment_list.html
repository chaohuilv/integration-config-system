<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>环境配置</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body>
    <div class="view-header">
        <div class="view-title">
            <h2>🌐 环境配置</h2>
            <p class="view-sub">管理不同系统的环境配置和 Base URL</p>
        </div>
        <div class="view-actions">
            <button class="btn btn-primary" id="btn-add" data-permission="env:add" onclick="parent.loadPage('envForm')">+ 新建环境</button>
        </div>
    </div>

    <div class="view-body">
        <div class="table-wrap">
            <table class="table">
                <thead>
                    <tr>
                        <th>系统名称</th>
                        <th>环境</th>
                        <th>Base URL</th>
                        <th>描述</th>
                        <th>状态</th>
                        <th>域名替换</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="envTable"></tbody>
            </table>
        </div>
        <div class="pagination" id="pagination"></div>
        <div id="empty" style="text-align:center;padding:40px;color:#999;display:none;">暂无数据</div>
    </div>

    <!-- 引入 jQuery -->
    <script src="../js/vendor/jquery.min.js"></script>
    <!-- 引入工具函数 -->
    <script src="../js/utils.js"></script>
    <!-- 引入 API 封装 -->
    <script src="../js/api.js"></script>
    <!-- 引入分页组件 -->
    <script src="../js/components/pagination.js"></script>
    <!-- 引入权限组件 -->
    <script src="../js/components/permission.js"></script>

    <script>
    $(function() {
        let currentPage = 1;
        const size = 10;
        let pager; // 分页组件实例

        // 通知主壳高亮侧边栏
        if (parent.setNav) parent.setNav('environments');

        // 初始化分页组件
        pager = new Pagination('#pagination', {
            pageSize: size,
            onPageChange: function(page) {
                currentPage = page;
                load();
            }
        });

        // 初始化权限组件
        Permission.init();

        // 加载环境列表
        load();

        // 加载环境列表
        function load() {
            API.environment.list({
                page: currentPage,
                size: size
            })
            .then(json => {
                const data = json.data;
                const list = data && data.content || [];
                renderEnvList(list);
                pager.render(data, currentPage);
            })
            .catch(err => {
                utils.toast('加载失败: ' + err.message, 'error');
            });
        }

        // 渲染环境列表
        function renderEnvList(data) {
            const tbody = $('#envTable');
            const empty = $('#empty');
            const tableWrap = $('.table-wrap');

            if (!data.length) {
                tbody.html('');
                empty.show();
                return;
            }

            empty.hide();
            const rowsHtml = data.map(e => `
                <tr>
                    <td><strong>${utils.escapeHtml(e.systemName)}</strong></td>
                    <td><span class="badge badge-${e.envName ? e.envName.toLowerCase() : 'dev'}">${utils.escapeHtml(e.envName)}</span></td>
                    <td style="color:#666;word-break:break-all;font-size:13px;">${utils.escapeHtml(e.baseUrl)}</td>
                    <td style="color:#999;font-size:13px;">${utils.escapeHtml(e.description || '-')}</td>
                    <td><span class="badge badge-${e.status === 'ACTIVE' ? 'active' : 'inactive'}">${e.status === 'ACTIVE' ? '启用' : '禁用'}</span></td>
                    <td><span class="badge badge-${e.urlReplace !== false ? 'active' : 'inactive'}">${e.urlReplace !== false ? '启用' : '禁用'}</span></td>
                    <td class="actions">
                        ${Permission.render('env:edit', `<button class="btn btn-sm btn-default" onclick="parent.loadPage('envForm', '${e.id}')">编辑</button>`)}
                        ${Permission.render('env:delete', `<button class="btn btn-sm btn-danger" onclick="deleteEnv('${e.id}')">删除</button>`)}
                    </td>
                </tr>
            `).join('');

            tbody.html(rowsHtml);
        }

        // 删除环境
        async function deleteEnv(id) {
            const ok = await utils.showConfirm('确认删除', '确定要删除此环境配置吗？', '🗑️', true);
            if (!ok) return;

            API.environment.delete(id)
                .then(() => {
                    utils.toast('删除成功', 'success');
                    load();
                })
                .catch(err => {
                    utils.toast('删除失败: ' + err.message, 'error');
                });
        }

        // 暴露给全局
        window.deleteEnv = deleteEnv;
    });
    </script>
</body>
</html>
