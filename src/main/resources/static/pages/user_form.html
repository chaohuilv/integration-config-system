<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - 新建/编辑</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        .user-form {
            max-width: 720px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 500;
            color: #333;
        }

        .form-group .required {
            color: #ff4d4f;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 10px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s;
            background: #fafafa;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
            background: #fff;
        }

        .form-group input:disabled {
            background: #f0f0f0;
            color: #999;
            cursor: not-allowed;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .hint {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 2px;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
        }
    </style>
</head>
<body>
    <div class="view-header">
        <div class="view-title">
            <h2>👤 <span id="pageTitle">新建用户</span></h2>
            <p class="view-sub">配置用户账号信息</p>
        </div>
        <div class="view-actions">
            <button class="btn btn-default" id="btnBack">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                返回列表
            </button>
        </div>
    </div>

    <div class="view-body">
        <div class="user-form">
            <input type="hidden" id="userId">
            <div class="form-grid">
                <div class="form-group">
                    <label>用户编码 <span class="required">*</span></label>
                    <input type="text" id="formUserCode" placeholder="用于登录，如：zhangsan">
                    <div class="hint">用户编码用于登录，建议使用工号或姓名拼音</div>
                </div>
                <div class="form-group">
                    <label>用户名称 <span class="required">*</span></label>
                    <input type="text" id="formUsername" placeholder="显示名称，如：张三">
                </div>
                <div class="form-group">
                    <label>密码 <span id="pwdHint">(新建必填)</span></label>
                    <input type="password" id="formPassword" placeholder="请输入密码">
                </div>
                <div class="form-group">
                    <label>显示名称</label>
                    <input type="text" id="formDisplayName" placeholder="可选，用于界面显示">
                </div>
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" id="formEmail" placeholder="请输入邮箱">
                </div>
                <div class="form-group">
                    <label>手机号</label>
                    <input type="tel" id="formPhone" placeholder="请输入手机号">
                </div>
                <div class="form-group">
                    <label>状态</label>
                    <select id="formStatus">
                        <option value="ACTIVE">启用</option>
                        <option value="INACTIVE">禁用</option>
                    </select>
                </div>
            </div>

            <div class="form-actions">
                <button class="btn btn-primary" id="btnSaveUser">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
                    保存
                </button>
                <button class="btn btn-default" id="btnCancel">取消</button>
            </div>
        </div>
    </div>

    <!-- 引入 jQuery -->
    <script src="../js/vendor/jquery.min.js"></script>
    <!-- 引入工具函数 -->
    <script src="../js/utils.js"></script>
    <!-- 引入 API 封装 -->
    <script src="../js/api.js"></script>

    <script>
    $(function() {
        // 从 URL 参数获取用户 ID（编辑模式）
        const urlParams = new URLSearchParams(window.location.search);
        const editId = urlParams.get('id');
        let isEdit = false;

        // 通知主壳高亮侧边栏
        if (parent.setNav) parent.setNav('users');

        // 编辑模式：加载用户数据
        async function loadUser(id) {
            try {
                // 通过用户列表接口拿到全部用户，从中找到目标用户
                const json = await API.auth.getUsers({ page: 1, size: 999 });
                const users = json.data.content || [];
                const user = users.find(u => String(u.id) === String(id));

                if (!user) {
                    utils.toast('用户不存在', 'error');
                    goBack();
                    return;
                }

                isEdit = true;
                $('#pageTitle').text('编辑用户');
                $('#userId').val(user.id);
                $('#formUserCode').val(user.userCode).prop('disabled', true);
                $('#formUsername').val(user.username || '');
                $('#formPassword').val('');
                $('#pwdHint').text('(留空则不修改)');
                $('#formDisplayName').val(user.displayName || '');
                $('#formEmail').val(user.email || '');
                $('#formPhone').val(user.phone || '');
                $('#formStatus').val(user.status || 'ACTIVE');
            } catch (err) {
                utils.toast('加载用户数据失败: ' + err.message, 'error');
            }
        }

        // 保存用户
        async function saveUser() {
            const id = $('#userId').val();
            const userCode = $('#formUserCode').val().trim();
            const username = $('#formUsername').val().trim();
            const password = $('#formPassword').val();
            const displayName = $('#formDisplayName').val().trim();
            const email = $('#formEmail').val().trim();
            const phone = $('#formPhone').val().trim();
            const status = $('#formStatus').val();

            if (!userCode) {
                utils.toast('请输入用户编码', 'error');
                return;
            }

            if (!username) {
                utils.toast('请输入用户名称', 'error');
                return;
            }

            if (!id && !password) {
                utils.toast('新建用户必须设置密码', 'error');
                return;
            }

            const data = { userCode, username, displayName, email, phone, status };
            if (password) data.password = password;

            try {
                if (id) {
                    await API.auth.updateUser(id, data);
                    utils.toast('用户信息已更新', 'success');
                } else {
                    await API.auth.createUser(data);
                    utils.toast('用户创建成功', 'success');
                }
                // 保存成功后跳回列表
                setTimeout(() => goBack(), 500);
            } catch (err) {
                utils.toast('操作失败: ' + err.message, 'error');
            }
        }

        // 返回列表
        function goBack() {
            if (parent.loadPage) {
                parent.loadPage('users');
            } else {
                window.location.href = 'user_list.html';
            }
        }

        // 绑定事件
        $('#btnBack').on('click', goBack);
        $('#btnCancel').on('click', goBack);
        $('#btnSaveUser').on('click', saveUser);

        // 初始化
        if (editId) {
            loadUser(editId);
        }
    });
    </script>
</body>
</html>
