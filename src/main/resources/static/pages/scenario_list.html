<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>场景编排</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        .search-bar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 16px; }
        .search-bar select, .search-bar input { min-width: 140px; }
        .search-bar .col-full { flex: 1; min-width: 200px; }

        .table-wrap { overflow-x: auto; }
        .table { min-width: 960px; }

        .col-check { width: 36px; text-align: center; }
        .col-name { min-width: 140px; }
        .col-code { min-width: 120px; }
        .col-group { width: 100px; }
        .col-steps { width: 70px; text-align: center; }
        .col-strategy { width: 100px; }
        .col-timeout { width: 80px; text-align: center; }
        .col-status { width: 70px; }
        .col-ops { width: 240px; }

        .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; }
        .tag-active { background: #dcfce7; color: #15803d; }
        .tag-inactive { background: #f1f5f9; color: #64748b; }
        .tag-stop { background: #fee2e2; color: #b91c1c; }
        .tag-continue { background: #fef9c3; color: #854d0e; }

        .ops { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
        .ops .btn { padding: 3px 10px; font-size: 12px; }
        .row-check { cursor: pointer; }

        .overview-cards { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
        .overview-card {
            background: #fff; border: 1px solid #e5e7eb; border-radius: 8px;
            padding: 12px 16px; min-width: 120px; flex: 1;
        }
        .overview-card .card-num { font-size: 24px; font-weight: 700; color: #1f2937; }
        .overview-card .card-label { font-size: 12px; color: #6b7280; margin-top: 2px; }
        .overview-card.scenario { border-left: 3px solid #8b5cf6; }
        .overview-card.scenario .card-num { color: #8b5cf6; }
    </style>
</head>
<body>
    <div class="view-header">
        <div class="view-title">
            <h2>🔀 场景编排</h2>
            <p class="view-sub">配置多步骤调用流程，支持前一步响应作为后一步输入参数，实现接口联动编排</p>
        </div>
        <div class="view-actions">
            <button class="btn btn-primary" id="btnCreate" data-permission="scenario:add">+ 新建场景</button>
        </div>
    </div>

    <div class="view-body">
        <!-- 概览卡片 -->
        <div class="overview-cards">
            <div class="overview-card scenario">
                <div class="card-num" id="totalCount">-</div>
                <div class="card-label">📋 场景总数</div>
            </div>
            <div class="overview-card">
                <div class="card-num" id="activeCount">-</div>
                <div class="card-label">✅ 启用中</div>
            </div>
        </div>

        <!-- 搜索栏 -->
        <div class="search-bar">
            <input type="text" class="search-input col-full" id="sKeyword" placeholder="场景名称 / 编码...">
            <select id="sGroup">
                <option value="">全部分组</option>
            </select>
            <select id="sStatus">
                <option value="">全部状态</option>
                <option value="ACTIVE">启用</option>
                <option value="INACTIVE">停用</option>
            </select>
            <button class="btn btn-ghost" id="btnSearch">🔍 搜索</button>
            <button class="btn btn-ghost" id="btnReset">重置</button>
        </div>

        <!-- 表格 -->
        <div class="table-wrap">
            <table class="table">
                <thead>
                    <tr>
                        <th class="col-check"><input type="checkbox" id="checkAll"></th>
                        <th>场景名称</th>
                        <th>编码</th>
                        <th>分组</th>
                        <th>步骤数</th>
                        <th>失败策略</th>
                        <th>超时(秒)</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody"><tr><td colspan="9" style="text-align:center;padding:40px;color:#999;">加载中...</td></tr></tbody>
            </table>
        </div>

        <!-- 分页 -->
        <div class="pagination" id="pagination"></div>
    </div>

    <script src="../js/vendor/jquery.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/components/pagination.js"></script>
    <script src="../js/components/permission.js"></script>
    <script>
    (function() {
        var pager;
        var currentPage = 0;
        var pageSize = 20;

        function toast(msg, type) { utils.toast(msg, type); }

        // ========== 初始化 ==========
        $(function() {
            Permission.init({ guard: true }).then(function() {
                if (Permission.isDenied()) return;
                loadGroups();
                pager = new Pagination('#pagination', {
                    pageSize: pageSize,
                    showTotal: true,
                    onPageChange: function(page) { loadTable(page); }
                });
                loadTable(1);
            });

            $('#btnSearch').click(function() { loadTable(1); });
            $('#btnReset').click(function() {
                $('#sKeyword').val('');
                $('#sGroup').val('');
                $('#sStatus').val('');
                loadTable(1);
            });
            $('#btnCreate').click(function() {
                location.href = 'scenario_edit.html';
            });
            $('#checkAll').change(function() {
                var checked = this.checked;
                $('#tableBody input[type="checkbox"]').each(function() { this.checked = checked; });
            });
        });

        // ========== 加载分组 ==========
        function loadGroups() {
            API.scenario.getGroups().then(function(res) {
                if (res.code === 200 && res.data) {
                    var html = '<option value="">全部分组</option>';
                    (res.data || []).forEach(function(g) {
                        html += '<option value="' + escHtml(g) + '">' + escHtml(g) + '</option>';
                    });
                    $('#sGroup').html(html);
                }
            });
        }

        // ========== 加载表格 ==========
        function loadTable(page) {
            if (page !== undefined) {
                currentPage = (typeof page === 'number') ? page - 1 : page;
            }
            var params = {
                page: currentPage,
                size: pageSize,
                keyword: $('#sKeyword').val().trim() || undefined,
                groupName: $('#sGroup').val() || undefined,
                status: $('#sStatus').val() || undefined
            };
            Object.keys(params).forEach(function(k) {
                if (params[k] === undefined || params[k] === '') delete params[k];
            });
            $('#tableBody').html('<tr><td colspan="9" style="text-align:center;padding:40px;color:#999;">加载中...</td></tr>');

            API.scenario.pageList(params).then(function(res) {
                if (res.code === 200) {
                    renderTable(res.data);
                    pager.render(res.data);
                    // 更新概览
                    $('#totalCount').text(res.data.totalElements || 0);
                    var active = (res.data.content || []).filter(function(i) { return i.status === 'ACTIVE'; }).length;
                    // 仅当前页数据，后续可加专门接口
                    if (res.data.number === 0) $('#activeCount').text('-');
                } else {
                    toast(res.message || '加载失败');
                }
            }).catch(function(e) { toast('加载失败: ' + e.message); });
        }

        function renderTable(data) {
            var list = data.content || [];
            if (list.length === 0) {
                $('#tableBody').html('<tr><td colspan="9" class="empty-cell">暂无数据</td></tr>');
                return;
            }
            var html = '';
            list.forEach(function(item) {
                var statusTag = item.status === 'ACTIVE'
                    ? '<span class="tag tag-active">启用</span>'
                    : '<span class="tag tag-inactive">停用</span>';
                var strategyTag = item.failureStrategy === 'CONTINUE'
                    ? '<span class="tag tag-continue">继续</span>'
                    : '<span class="tag tag-stop">终止</span>';
                html += '<tr data-id="' + item.id + '">'
                    + '<td class="col-check"><input type="checkbox" class="row-check" value="' + item.id + '"></td>'
                    + '<td class="col-name">' + escHtml(item.name) + '</td>'
                    + '<td class="col-code"><code>' + escHtml(item.code) + '</code></td>'
                    + '<td class="col-group">' + escHtml(item.groupName || '-') + '</td>'
                    + '<td class="col-steps">' + (item.stepCount || 0) + '</td>'
                    + '<td>' + strategyTag + '</td>'
                    + '<td class="col-timeout">' + (item.timeoutSeconds || 300) + '</td>'
                    + '<td>' + statusTag + '</td>'
                    + '<td><div class="ops">'
                    + '<button class="btn btn-ghost btn-sm" data-permission="scenario:view" onclick="window._edit(\'' + item.id + '\')">编辑</button>'
                    + '<button class="btn btn-ghost btn-sm" data-permission="scenario:execute" onclick="window._exec(\'' + item.id + '\')">执行</button>'
                    + '<button class="btn btn-ghost btn-sm" data-permission="scenario:edit" onclick="window._toggle(\'' + item.id + '\')">' + (item.status === 'ACTIVE' ? '停用' : '启用') + '</button>'
                    + '<button class="btn btn-danger btn-sm" data-permission="scenario:delete" onclick="window._delete(\'' + item.id + '\')">删除</button>'
                    + '</div></td></tr>';
            });
            $('#tableBody').html(html);
            Permission.apply('#tableBody');
        }

        // ========== 操作 ==========
        window._edit = function(id) {
            location.href = 'scenario_edit.html?id=' + id;
        };

        window._exec = function(id) {
            location.href = 'scenario_exec.html?id=' + id;
        };

        window._toggle = function(id) {
            API.scenario.toggle(String(id)).then(function() {
                toast('状态已切换', 'success');
                loadTable();
            }).catch(function(e) { toast(e.message, 'error'); });
        };

        window._delete = function(id) {
            utils.confirm('确定删除该场景？步骤和执行记录将一并删除。', function() {
                API.scenario.delete(String(id)).then(function() {
                    toast('已删除', 'success');
                    loadTable();
                }).catch(function(e) { toast(e.message, 'error'); });
            });
        };

        function escHtml(s) {
            if (!s) return '';
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }
    })();
    </script>
</body>
</html>
